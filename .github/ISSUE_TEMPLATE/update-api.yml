name: Update API Information
description: Request a correction or update to an existing API entry.
title: "[Update] "
labels: ["update-api", "auto-process"]
body:
  - type: markdown
    attributes:
      value: |
        Help us keep the directory accurate!
        Fill in the API name and only the fields that need to change.

  - type: input
    id: api_name
    attributes:
      label: API Name
      description: The exact name of the API as currently listed on the website.
      placeholder: "e.g. CoinGecko"
    validations:
      required: true

  - type: textarea
    id: changes
    attributes:
      label: What needs to be updated?
      description: Describe what is wrong and what the correct information should be.
      placeholder: |
        - URL changed to https://new-url.com
        - Now requires an API key
        - CORS is actually supported
    validations:
      required: true

  - type: input
    id: new_url
    attributes:
      label: New URL
      description: The corrected URL if the API has moved. Leave empty if unchanged.
      placeholder: "https://new-api-url.com"

  - type: dropdown
    id: new_auth
    attributes:
      label: New Auth Type
      description: Select only if the authentication method has changed.
      options:
        - No change
        - None (no authentication required)
        - apiKey
        - OAuth
        - X-Mashape-Key
        - User-Agent

  - type: dropdown
    id: new_https
    attributes:
      label: New HTTPS Status
      description: Select only if the HTTPS support has changed.
      options:
        - No change
        - "Yes"
        - "No"

  - type: dropdown
    id: new_cors
    attributes:
      label: New CORS Status
      description: Select only if the CORS support has changed.
      options:
        - No change
        - "Yes"
        - "No"
        - "Unknown"
