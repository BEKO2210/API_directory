name: Submit New API
description: Suggest a new free public API to add to the directory
title: "[New API] "
labels: ["new-api", "auto-process"]
body:
  - type: input
    id: api_name
    attributes:
      label: API Name
      placeholder: "e.g. Open Meteo"
    validations:
      required: true

  - type: input
    id: api_url
    attributes:
      label: API URL
      description: Link to the API or its documentation
      placeholder: "https://open-meteo.com/en/docs"
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: Description
      description: Short description of what the API does (max 100 characters)
      placeholder: "Free weather forecast API with no API key required"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Animals
        - Anime
        - Anti-Malware
        - Art & Design
        - Authentication
        - Blockchain
        - Books
        - Business
        - Calendar
        - Cloud Storage
        - Continuous Integration
        - Cryptocurrency
        - Currency Exchange
        - Data Validation
        - Development
        - Dictionaries
        - Documents
        - Email
        - Entertainment
        - Environment
        - Events
        - Finance
        - Food & Drink
        - Games & Comics
        - Geocoding
        - Government
        - Health
        - Jobs
        - Machine Learning
        - Music
        - News
        - Open Data
        - Open Source
        - Patent
        - Personality
        - Phone
        - Photography
        - Programming
        - Science & Math
        - Security
        - Shopping
        - Social
        - Sports & Fitness
        - Test Data
        - Text Analysis
        - Tracking
        - Transportation
        - URL Shorteners
        - Vehicle
        - Video
        - Weather
    validations:
      required: true

  - type: dropdown
    id: auth
    attributes:
      label: Authentication
      options:
        - None
        - apiKey
        - OAuth
        - X-Mashape-Key
        - User-Agent
    validations:
      required: true

  - type: dropdown
    id: https
    attributes:
      label: HTTPS Support
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: dropdown
    id: cors
    attributes:
      label: CORS Support
      options:
        - "Yes"
        - "No"
        - "Unknown"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any extra information about this API
