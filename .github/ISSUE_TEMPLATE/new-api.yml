name: Submit New API
description: Suggest a new free public API to add to the directory.
title: "[New API] "
labels: ["new-api", "auto-process"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing! Please fill in all required fields.
        Your API will be automatically added on the next build if all information is valid.

  - type: input
    id: api_name
    attributes:
      label: API Name
      description: The official name of the API.
      placeholder: "e.g. Open Meteo"
    validations:
      required: true

  - type: input
    id: api_url
    attributes:
      label: API URL
      description: Link to the API documentation or homepage. Must start with https://.
      placeholder: "https://open-meteo.com/en/docs"
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: Description
      description: A short description of what the API does (max 100 characters).
      placeholder: "Free weather forecast API with no API key required"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Choose the category that best fits this API.
      options:
        - Animals
        - Anime
        - Anti-Malware
        - Art & Design
        - Authentication & Authorization
        - Blockchain
        - Books
        - Business
        - Calendar
        - Cloud Storage & File Sharing
        - Continuous Integration
        - Cryptocurrency
        - Currency Exchange
        - Data Validation
        - Development
        - Dictionaries
        - Documents & Productivity
        - Email
        - Entertainment
        - Environment
        - Events
        - Finance
        - Food & Drink
        - Games & Comics
        - Geocoding
        - Government
        - Health
        - Jobs
        - Machine Learning
        - Music
        - News
        - Open Data
        - Open Source Projects
        - Patent
        - Personality
        - Phone
        - Photography
        - Programming
        - Science & Math
        - Security
        - Shopping
        - Social
        - Sports & Fitness
        - Test Data
        - Text Analysis
        - Tracking
        - Transportation
        - URL Shorteners
        - Vehicle
        - Video
        - Weather
    validations:
      required: true

  - type: dropdown
    id: auth
    attributes:
      label: Authentication
      description: What authentication does the API require?
      options:
        - None (no authentication required)
        - apiKey
        - OAuth
        - X-Mashape-Key
        - User-Agent
    validations:
      required: true

  - type: dropdown
    id: https
    attributes:
      label: HTTPS Support
      description: Does the API support HTTPS?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: dropdown
    id: cors
    attributes:
      label: CORS Support
      description: Does the API support CORS (Cross-Origin Resource Sharing)?
      options:
        - "Yes"
        - "No"
        - "Unknown"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any extra information (rate limits, special features, example endpoints).
      placeholder: "e.g. Free tier allows 10,000 requests/day. No signup required."
