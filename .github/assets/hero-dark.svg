<svg xmlns="http://www.w3.org/2000/svg" width="840" height="280" viewBox="0 0 840 280">
  <defs>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      @keyframes dash {
        from { stroke-dashoffset: 840; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .hero-bg { fill: #09090b; }
      .accent-line {
        stroke: url(#grad);
        stroke-width: 3;
        stroke-dasharray: 840;
        stroke-dashoffset: 840;
        animation: dash 2s ease-out forwards;
      }
      .title {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 48px;
        font-weight: 800;
        fill: #fafafa;
        letter-spacing: -2px;
        animation: fadeIn 0.8s ease-out forwards;
        opacity: 0;
      }
      .subtitle {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 18px;
        fill: #a1a1aa;
        animation: fadeIn 0.8s ease-out 0.3s forwards;
        opacity: 0;
      }
      .stat-num {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 28px;
        font-weight: 700;
        fill: #818cf8;
        animation: fadeIn 0.6s ease-out forwards;
        opacity: 0;
      }
      .stat-label {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 11px;
        fill: #52525b;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        animation: fadeIn 0.6s ease-out forwards;
        opacity: 0;
      }
      .s1n { animation-delay: 0.6s; }
      .s1l { animation-delay: 0.7s; }
      .s2n { animation-delay: 0.8s; }
      .s2l { animation-delay: 0.9s; }
      .s3n { animation-delay: 1.0s; }
      .s3l { animation-delay: 1.1s; }
      .dot {
        fill: #818cf8;
        animation: pulse 2s ease-in-out infinite;
      }
      .dot2 { animation-delay: 0.3s; }
      .dot3 { animation-delay: 0.6s; }
      .cursor {
        fill: #818cf8;
        animation: blink 1s step-end infinite;
        animation-delay: 2s;
      }
      .ib { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
      .ib1 { animation-delay: 1.3s; }
      .ib2 { animation-delay: 1.5s; }
      .ib3 { animation-delay: 1.7s; }
      .ib4 { animation-delay: 1.9s; }
      .ib5 { animation-delay: 2.1s; }
      .it1 { animation-delay: 1.4s; }
      .it2 { animation-delay: 1.6s; }
      .it3 { animation-delay: 1.8s; }
      .it4 { animation-delay: 2.0s; }
      .it5 { animation-delay: 2.2s; }
      .icon-text {
        font-family: system-ui, sans-serif;
        font-size: 11px;
        fill: #71717a;
        text-anchor: middle;
        animation: fadeIn 0.5s ease-out forwards;
        opacity: 0;
      }
    </style>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#6366f1;#818cf8;#6366f1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#818cf8;#6366f1;#818cf8" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect class="hero-bg" width="840" height="280" rx="12"/>
  <line class="accent-line" x1="0" y1="3" x2="840" y2="3"/>

  <text class="title" x="40" y="80">API Hub</text>
  <rect class="cursor" x="242" y="55" width="3" height="30" rx="1"/>

  <text class="subtitle" x="40" y="115">Every Free API, One Place.</text>

  <circle class="dot" cx="280" cy="108" r="2"/>
  <circle class="dot dot2" cx="290" cy="108" r="2"/>
  <circle class="dot dot3" cx="300" cy="108" r="2"/>

  <text class="stat-num s1n" x="40" y="150">1,424</text>
  <text class="stat-label s1l" x="40" y="170">APIs</text>

  <text class="stat-num s2n" x="190" y="150">51</text>
  <text class="stat-label s2l" x="190" y="170">Categories</text>

  <text class="stat-num s3n" x="340" y="150">Daily</text>
  <text class="stat-label s3l" x="340" y="170">Sync</text>

  <rect class="ib ib1" x="40" y="200" width="80" height="52" rx="8" fill="#18181b"/>
  <text class="icon-text it1" x="80" y="232">Animals</text>

  <rect class="ib ib2" x="132" y="200" width="80" height="52" rx="8" fill="#18181b"/>
  <text class="icon-text it2" x="172" y="232">Finance</text>

  <rect class="ib ib3" x="224" y="200" width="80" height="52" rx="8" fill="#18181b"/>
  <text class="icon-text it3" x="264" y="232">Weather</text>

  <rect class="ib ib4" x="316" y="200" width="80" height="52" rx="8" fill="#18181b"/>
  <text class="icon-text it4" x="356" y="232">Music</text>

  <rect class="ib ib5" x="408" y="200" width="100" height="52" rx="8" fill="#18181b"/>
  <text class="icon-text it5" x="458" y="232">+ 47 more</text>
</svg>
